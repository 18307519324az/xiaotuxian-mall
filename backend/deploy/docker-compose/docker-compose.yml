version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: xtx-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-local-dev-only}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7
    container_name: xtx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: xtx-nacos
    environment:
      MODE: standalone
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${MYSQL_SERVICE_PASSWORD:-change-me-local-dev-only}
    ports:
      - "8848:8848"
    depends_on:
      - mysql

volumes:
  mysql-data:
  redis-data:
